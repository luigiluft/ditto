<!doctype html><html><head><meta charset="utf-8"><style>
  body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#0e0f13;font-family:system-ui}
  .card{width:360px;height:200px;border-radius:20px;background:linear-gradient(135deg,#0a84ff,#30d158);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:600;
    transform:translateY(60px);opacity:0;transition:transform .4s linear,opacity .4s linear}
  body.play .card{transform:none;opacity:1}
</style></head><body>
  <div class="card">CLONE (bad)</div>
</body></html>
